name: Toolshed
options:
  bundleIdPrefix: com.shimondeitel.toolshed
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "4"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Toolshed:
    type: application
    platform: iOS
    sources:
      - path: Toolshed
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.toolshed
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Toolshed/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ToolshedTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ToolshedTests
      - path: Toolshed.storekit
    dependencies:
      - target: Toolshed
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.toolshed.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ToolshedUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ToolshedUITests
    dependencies:
      - target: Toolshed
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.toolshed.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Toolshed:
    build:
      targets:
        Toolshed: all
        ToolshedTests: [test]
        ToolshedUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Toolshed.storekit
    test:
      config: Debug
      storeKitConfiguration: Toolshed.storekit
      targets:
        - ToolshedTests
        - ToolshedUITests
    archive:
      config: Release
